<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maya — Journal</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .post-content {
      font-size: 1rem;
      line-height: 1.85;
      color: var(--text-secondary);
    }
    .post-content p  { margin-bottom: 1.4em; }
    .post-content h2 { font-family: var(--font-display); font-size: 1.4rem; color: var(--text-primary); margin: 2em 0 0.6em; }
    .post-content h3 { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); margin: 1.6em 0 0.4em; }
    .post-content em { color: var(--text-primary); font-style: italic; }
    .post-content strong { color: var(--text-primary); font-weight: 600; }
    .post-content hr { border: none; border-top: 1px solid var(--border-subtle); margin: 2em 0; }

    .paywall-blur {
      position: relative;
      overflow: hidden;
      max-height: 200px;
    }
    .paywall-blur::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 160px;
      background: linear-gradient(to bottom, transparent, var(--bg-base));
    }

    .paywall-gate {
      text-align: center;
      padding: var(--space-7) var(--space-5);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      background: var(--bg-surface);
      margin-top: var(--space-5);
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav__logo">Maya</a>
  <ul class="nav__links">
    <li><a href="/chat">Chat</a></li>
    <li><a href="/blog">Journal</a></li>
    <li><a href="/profile">Profile</a></li>
  </ul>
</nav>

<div class="container--narrow" style="padding-top:var(--space-6);padding-bottom:var(--space-8);" id="post-container">
  <div style="color:var(--text-muted);font-size:0.9rem;">Loading...</div>
</div>

<script>
  const token = localStorage.getItem('maya_token')
  if (!token) { window.location.href = '/login' }

  // Slug injected by Jinja2
  const SLUG = {{ slug | tojson }}

  async function loadPost() {
    const res = await fetch(`/api/blog/posts/${SLUG}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    })
    if (res.status === 401) { window.location.href = '/login'; return }
    if (res.status === 404) {
      document.getElementById('post-container').innerHTML =
        '<div style="color:var(--text-muted);padding:var(--space-7) 0;text-align:center;">Post not found.</div>'
      return
    }
    const post = await res.json()
    renderPost(post)
  }

  function renderPost(post) {
    const container = document.getElementById('post-container')
    document.title  = `Maya — ${post.title}`

    const date = post.published_at
      ? new Date(post.published_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
      : ''

    const cover = post.cover_image_url
      ? `<div style="width:100%;aspect-ratio:16/7;border-radius:var(--radius-lg);overflow:hidden;margin-bottom:var(--space-6);border:1px solid var(--border-subtle);">
           <img src="${esc(post.cover_image_url)}" style="width:100%;height:100%;object-fit:cover;" alt="">
         </div>`
      : ''

    const badge = post.is_free
      ? `<span style="font-size:0.7rem;background:rgba(106,201,122,0.15);color:var(--accent-success);border-radius:999px;padding:2px 10px;font-weight:600;">FREE</span>`
      : post.unlocked
      ? `<span style="font-size:0.7rem;background:rgba(201,149,106,0.15);color:var(--accent-primary);border-radius:999px;padding:2px 10px;font-weight:600;">UNLOCKED</span>`
      : `<span style="font-size:0.7rem;background:rgba(255,255,255,0.06);color:var(--text-muted);border-radius:999px;padding:2px 10px;font-family:var(--font-mono);">🔒 ${post.credit_cost} credits</span>`

    let bodyHtml
    if (post.unlocked) {
      // Render content — newline-separated paragraphs
      const paragraphs = post.content
        .split(/\n{2,}/)
        .map(p => p.trim())
        .filter(Boolean)
        .map(p => `<p>${esc(p).replace(/\n/g, '<br>')}</p>`)
        .join('')
      bodyHtml = `<div class="post-content">${paragraphs}</div>`
    } else {
      // Show blurred excerpt + paywall gate
      const excerptHtml = `<p>${esc(post.excerpt)}</p>`
      bodyHtml = `
        <div class="paywall-blur">
          <div class="post-content">${excerptHtml}</div>
        </div>
        <div class="paywall-gate">
          <div style="font-size:2rem;margin-bottom:var(--space-3);">🔒</div>
          <h3 style="font-size:1.1rem;margin-bottom:var(--space-2);color:var(--text-primary);">This entry is private</h3>
          <p style="font-size:0.88rem;color:var(--text-secondary);margin-bottom:var(--space-5);max-width:360px;margin-left:auto;margin-right:auto;line-height:1.65;">
            Unlock this entry for <strong style="color:var(--accent-primary);">${post.credit_cost} credit${post.credit_cost !== 1 ? 's' : ''}</strong>.
            Once unlocked it's yours to read any time.
          </p>
          <div id="unlock-error" class="alert alert--error hidden" style="margin-bottom:var(--space-4);text-align:left;"></div>
          <button class="btn btn-primary" id="unlock-btn" onclick="unlockPost()">
            Unlock for ${post.credit_cost} credit${post.credit_cost !== 1 ? 's' : ''}
          </button>
          <div style="margin-top:var(--space-3);">
            <a href="/chat" style="font-size:0.78rem;color:var(--text-muted);">Need credits? Get more →</a>
          </div>
        </div>
      `
    }

    container.innerHTML = `
      <a href="/blog" style="font-size:0.8rem;color:var(--text-muted);text-decoration:none;display:inline-flex;align-items:center;gap:6px;margin-bottom:var(--space-5);">
        ← Back to Journal
      </a>
      ${cover}
      <div style="display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-3);flex-wrap:wrap;">
        ${badge}
        ${date ? `<span style="font-size:0.72rem;font-family:var(--font-mono);color:var(--text-muted);">${date}</span>` : ''}
      </div>
      <h1 style="font-family:var(--font-display);font-size:clamp(1.6rem,4vw,2.4rem);color:var(--text-accent);margin-bottom:var(--space-5);line-height:1.2;">${esc(post.title)}</h1>
      ${bodyHtml}
    `
  }

  async function unlockPost() {
    const btn = document.getElementById('unlock-btn')
    const errBox = document.getElementById('unlock-error')
    btn.disabled = true
    btn.textContent = 'Unlocking...'
    errBox.classList.add('hidden')

    try {
      const res = await fetch(`/api/blog/posts/${SLUG}/unlock`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      })
      const data = await res.json()
      if (res.status === 402) {
        errBox.textContent = data.detail || "Not enough credits."
        errBox.classList.remove('hidden')
        btn.disabled = false
        btn.textContent = 'Unlock'
        return
      }
      if (!res.ok) {
        errBox.textContent = data.detail || 'Something went wrong.'
        errBox.classList.remove('hidden')
        btn.disabled = false
        btn.textContent = 'Unlock'
        return
      }
      // Reload to show full content
      loadPost()
    } catch (err) {
      errBox.textContent = 'Connection error. Try again.'
      errBox.classList.remove('hidden')
      btn.disabled = false
      btn.textContent = 'Unlock'
    }
  }

  function esc(str) {
    if (!str) return ''
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  loadPost()
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maya — Journal</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<nav class="nav">
  <a href="/" class="nav__logo">Maya</a>
  <ul class="nav__links">
    <li><a href="/chat">Chat</a></li>
    <li><a href="/blog" style="color:var(--text-primary);">Journal</a></li>
    <li><a href="/profile">Profile</a></li>
  </ul>
</nav>

<div class="container--narrow" style="padding-top:var(--space-7);padding-bottom:var(--space-8);">

  <div style="margin-bottom:var(--space-6);">
    <div style="font-family:var(--font-mono);font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:var(--space-3);">Maya's Journal</div>
    <h1 style="font-family:var(--font-display);font-style:italic;font-size:clamp(2rem,5vw,3rem);color:var(--text-accent);margin-bottom:var(--space-3);">Private Writing</h1>
    <p style="color:var(--text-secondary);font-size:0.95rem;max-width:520px;line-height:1.7;">
      Things I don't say out loud. Unlock entries with credits — some are free.
    </p>
  </div>

  <div id="credits-bar" style="display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-6);padding:12px 16px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);">
    <span style="font-size:0.8rem;color:var(--text-muted);">Your credits:</span>
    <span style="font-family:var(--font-mono);color:var(--accent-primary);font-size:0.95rem;" id="credits-count">—</span>
    <a href="/chat" style="margin-left:auto;font-size:0.78rem;color:var(--accent-primary);text-decoration:none;">+ Get more</a>
  </div>

  <div id="post-grid" style="display:flex;flex-direction:column;gap:var(--space-4);">
    <div style="color:var(--text-muted);font-size:0.9rem;">Loading...</div>
  </div>

</div>

<script>
  const token = localStorage.getItem('maya_token')
  if (!token) { window.location.href = '/login' }

  async function loadCredits() {
    const res = await fetch('/api/payments/balance', { headers: { 'Authorization': `Bearer ${token}` } })
    if (res.status === 401) { window.location.href = '/login'; return }
    const data = await res.json()
    document.getElementById('credits-count').textContent = data.balance
  }

  async function loadPosts() {
    const res = await fetch('/api/blog/posts', { headers: { 'Authorization': `Bearer ${token}` } })
    if (res.status === 401) { window.location.href = '/login'; return }
    const data = await res.json()
    renderPosts(data.posts || [])
  }

  function renderPosts(posts) {
    const grid = document.getElementById('post-grid')
    if (!posts.length) {
      grid.innerHTML = '<div style="color:var(--text-muted);font-size:0.9rem;padding:var(--space-6) 0;text-align:center;">Nothing published yet.</div>'
      return
    }
    grid.innerHTML = posts.map(p => {
      const date = p.published_at ? new Date(p.published_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : ''
      const coverStyle = p.cover_image_url
        ? `background:url('${esc(p.cover_image_url)}') center/cover no-repeat;`
        : 'background:var(--bg-elevated);'
      const badge = p.is_free
        ? `<span style="font-size:0.7rem;background:rgba(106,201,122,0.15);color:var(--accent-success);border-radius:999px;padding:2px 10px;font-weight:600;">FREE</span>`
        : p.unlocked
        ? `<span style="font-size:0.7rem;background:rgba(201,149,106,0.15);color:var(--accent-primary);border-radius:999px;padding:2px 10px;font-weight:600;">UNLOCKED</span>`
        : `<span style="font-size:0.7rem;background:rgba(255,255,255,0.06);color:var(--text-muted);border-radius:999px;padding:2px 10px;font-family:var(--font-mono);">🔒 ${p.credit_cost} credits</span>`

      return `
        <div class="card" style="display:flex;gap:var(--space-4);align-items:flex-start;cursor:pointer;transition:border-color 0.15s;" onclick="window.location.href='/blog/${esc(p.slug)}'">
          <div style="width:96px;height:96px;border-radius:var(--radius-md);flex-shrink:0;${coverStyle}display:flex;align-items:center;justify-content:center;">
            ${!p.cover_image_url ? '<span style="font-size:1.8rem;">✍️</span>' : ''}
          </div>
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-2);flex-wrap:wrap;">
              ${badge}
              ${date ? `<span style="font-size:0.72rem;font-family:var(--font-mono);color:var(--text-muted);">${date}</span>` : ''}
            </div>
            <h2 style="font-family:var(--font-display);font-size:1.2rem;color:var(--text-primary);margin-bottom:var(--space-2);line-height:1.3;">${esc(p.title)}</h2>
            <p style="font-size:0.85rem;color:var(--text-secondary);line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;">${esc(p.excerpt)}</p>
            <div style="margin-top:var(--space-3);">
              ${p.is_free || p.unlocked
                ? `<span style="font-size:0.8rem;color:var(--accent-primary);">Read →</span>`
                : `<span style="font-size:0.8rem;color:var(--text-muted);">Unlock to read full entry →</span>`
              }
            </div>
          </div>
        </div>
      `
    }).join('')
  }

  function esc(str) {
    if (!str) return ''
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  loadCredits()
  loadPosts()
</script>
</body>
</html>
